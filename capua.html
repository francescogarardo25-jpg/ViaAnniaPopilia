<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>capua - Via Popilia</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            line-height: 1.8;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            background-color: #f9f7f2;
            color: #333; /* Il testo rimane scuro/nero per leggibilità */
        }

        /* TITOLI IN ROSSO */
        h1, h2, h3, h4 {
            color: red !important;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 40px;
            margin-bottom: 20px;
            padding-left: 15px;
            /* LINEE DEI TITOLI IN BLU */
            border-left: 5px solid blue; 
        }

        h1 {
            text-align: center;
            border-left: none;
            /* LINEA SOTTO IL TITOLO IN BLU */
            border-bottom: 3px double blue;
            padding-left: 0;
            padding-bottom: 10px;
            font-size: 2.5rem;
        }

        p {
            background: white;
            padding: 20px;
            border-radius: 4px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.05);
            text-align: justify;
            margin-bottom: 20px;
        }

        /* LINK IN BLU */
        a {
            color: blue !important;
            text-decoration: none;
            font-weight: bold;
            border-bottom: 1px solid blue;
        }

        /* BOTTONE IN BLU */
        .btn-mappa {
            display: block;
            text-align: center;
            margin: 50px auto;
            padding: 15px 30px;
            background-color: blue; 
            color: white !important;
            border-radius: 50px;
            text-decoration: none;
            width: fit-content;
            font-weight: bold;
            text-transform: uppercase;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1, h2, h3, h4, p, .btn-mappa {
            animation: fadeIn 1s ease-in;
        }
    </style>
</head>
<body>

    
    <a href="mappa_interattiva.html" class="btn-mappa">← TORNA ALLA MAPPA</a>   

</body>
</html>
