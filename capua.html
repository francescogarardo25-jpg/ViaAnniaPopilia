<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nola - Via Popilia</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            line-height: 1.8;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            background-color: #f9f7f2;
        }

        /* HEADER E TITOLI IN ROSSO */
        h1 {
            text-align: center;
            color: #b22222; /* ROSSO */
            font-size: 3rem;
            letter-spacing: 4px;
            border-bottom: 3px double #b22222; 
            margin-bottom: 50px;
            text-transform: uppercase;
        }

        h2, h3, h4 {
            color: #b22222; /* ROSSO */
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 40px;
            margin-bottom: 20px;
            border-left: 5px solid #b22222;
            padding-left: 15px;
        }

        /* TESTO IN BLU */
        p {
            background: white;
            padding: 20px;
            border-radius: 4px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.05);
            text-align: justify;
            margin-bottom: 20px;
            color: #00008b; /* BLU SCURO */
        }

        /* LINK IN ORO */
        a {
            color: #d4af37; /* ORO */
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            border-bottom: 1px solid #d4af37;
        }

        a:hover {
            color: #b22222;
            border-bottom: 1px solid #b22222;
        }

        .btn-mappa {
            display: block;
            text-align: center;
            margin: 50px auto;
            padding: 15px 30px;
            background-color: #b22222; /* Bottone Rosso come i titoli */
            color: white !important;
            border-radius: 50px;
            font-size: 1.2rem;
            text-decoration: none;
            width: fit-content;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1, h2, h3, h4, p, .btn-mappa {
            animation: fadeIn 1s ease-in;
        }
    </style>
</head>
<body>
 <h1>jo</h1>
    <p>ciao</p>
    
    <a href="mappa_interattiva.html" class="btn-mappa">← TORNA ALLA MAPPA</a>   

</body>
</html>
