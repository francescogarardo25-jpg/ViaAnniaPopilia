<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>leggenda colori</title>
    <style>
        /* STILE COERENTE CON LE ALTRE PAGINE */
        body {
            font-family: 'Georgia', serif;
            line-height: 1.8;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            background-color: #f9f7f2;
            background-image: linear-gradient(to right, rgba(0,0,0,0.02) 1px, transparent 1px);
            background-size: 20px 100%;
        }

        h1 {
            text-align: center;
            color: #630d0d; /* Rosso Pompeiano */
            font-size: 3rem;
            letter-spacing: 4px;
            border-bottom: 3px double #630d0d;
            margin-bottom: 50px;
            text-transform: uppercase;
        }

        p {
            background: white;
            padding: 25px;
            border-radius: 4px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.05);
            text-align: justify;
            white-space: pre-line; /* RISPETTA I TUOI A CAPO ORIGINALI */
        }

        /* ANIMAZIONE */
        h1, p {
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 40px;
            color: #b8860b;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
